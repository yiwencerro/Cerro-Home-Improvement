// ── Draw Carlos (scale 1.0 = full size) ───────────────────────────────────────
function drawCarlos(ctx,x,y,facing,action){
  ctx.save();
  const s=1.0;
  if(facing==="left"){ctx.translate(x*2+36*s,0);ctx.scale(-1,1);}
  ctx.fillStyle="rgba(0,0,0,0.13)";ctx.beginPath();ctx.ellipse(x+18*s,y+68*s,17*s,5*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#3d2b1a";
  ctx.beginPath();ctx.roundRect(x+4*s,y+59*s,14*s,8*s,[3,6,2,2]);ctx.fill();
  ctx.beginPath();ctx.roundRect(x+20*s,y+59*s,14*s,8*s,[3,6,2,2]);ctx.fill();
  ctx.fillStyle="#4a4a4a";
  ctx.beginPath();ctx.roundRect(x+6*s,y+39*s,11*s,23*s,2);ctx.fill();
  ctx.beginPath();ctx.roundRect(x+19*s,y+39*s,11*s,23*s,2);ctx.fill();
  ctx.fillStyle="#2a1a0a";ctx.fillRect(x+5*s,y+37*s,28*s,4*s);
  ctx.fillStyle="#c8a020";ctx.fillRect(x+15*s,y+37*s,8*s,4*s);
  ctx.fillStyle="#2c3e50";ctx.beginPath();ctx.roundRect(x+3*s,y+18*s,32*s,22*s,5);ctx.fill();
  ctx.fillStyle="#1a252f";ctx.beginPath();ctx.moveTo(x+15*s,y+18*s);ctx.lineTo(x+19*s,y+28*s);ctx.lineTo(x+23*s,y+18*s);ctx.closePath();ctx.fill();
  ctx.fillStyle="#2c3e50";ctx.beginPath();ctx.roundRect(x-3*s,y+18*s,9*s,22*s,4);ctx.fill();
  if(action==="painting"){ctx.beginPath();ctx.roundRect(x+30*s,y+10*s,9*s,22*s,4);ctx.fill();}
  else{ctx.beginPath();ctx.roundRect(x+30*s,y+18*s,9*s,22*s,4);ctx.fill();}
  ctx.fillStyle="#d4a055";
  ctx.beginPath();ctx.arc(x+1*s,y+41*s,5*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+35*s,action==="painting"?y+32*s:y+41*s,5*s,0,Math.PI*2);ctx.fill();
  if(action==="painting"){

// ── Draw Michael (scaled smaller, s=0.72) ─────────────────────────────────────
function drawMichael(ctx,x,y,facing,tool){
  ctx.save();
  const s=0.72;
  if(facing==="left"){ctx.translate(x*2+30*s,0);ctx.scale(-1,1);}
  ctx.fillStyle="rgba(0,0,0,0.10)";ctx.beginPath();ctx.ellipse(x+15*s,y+66*s,14*s,4*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#1a1a1a";
  ctx.beginPath();ctx.roundRect(x+3*s,y+58*s,12*s,8*s,[3,5,2,2]);ctx.fill();
  ctx.beginPath();ctx.roundRect(x+18*s,y+58*s,12*s,8*s,[3,5,2,2]);ctx.fill();
  ctx.fillStyle="#1a1a2e";
  ctx.beginPath();ctx.roundRect(x+4*s,y+37*s,10*s,25*s,2);ctx.fill();
  ctx.beginPath();ctx.roundRect(x+17*s,y+37*s,10*s,25*s,2);ctx.fill();
  ctx.fillStyle="#1c1c1c";ctx.beginPath();ctx.roundRect(x+2*s,y+16*s,28*s,23*s,4);ctx.fill();
  ctx.beginPath();ctx.roundRect(x-3*s,y+16*s,8*s,24*s,3);ctx.fill();
  const raised=tool!=="none";
  if(raised){ctx.beginPath();ctx.roundRect(x+27*s,y+10*s,8*s,20*s,3);ctx.fill();}
  else{ctx.beginPath();ctx.roundRect(x+27*s,y+16*s,8*s,24*s,3);ctx.fill();}
  ctx.fillStyle="#e8c090";
  ctx.beginPath();ctx.arc(x+1*s,y+41*s,5*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+31*s,raised?y+30*s:y+41*s,5*s,0,Math.PI*2);ctx.fill();
  if(tool==="roller"){
    ctx.fillStyle="#888";ctx.fillRect(x+31*s,y+12*s,4*s,20*s);
    ctx.fillStyle="#ffaacc";ctx.beginPath();ctx.roundRect(x+27*s,y+10*s,12*s,7*s,3);ctx.fill();
  }else if(tool==="flashlight"){
    ctx.fillStyle="#666";ctx.fillRect(x+31*s,y+14*s,6*s,18*s);
    ctx.fillStyle="#ffff99";ctx.beginPath();ctx.arc(x+34*s,y+14*s,6*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="rgba(255,255,160,0.12)";
    ctx.beginPath();ctx.moveTo(x+28*s,y+10*s);ctx.lineTo(x-15*s,y-18*s);ctx.lineTo(x+75*s,y-18*s);ctx.closePath();ctx.fill();
  }else if(tool==="wrench"){
    ctx.strokeStyle="#888";ctx.lineWidth=3*s;
    ctx.beginPath();ctx.moveTo(x+31*s,y+32*s);ctx.lineTo(x+31*s,y+14*s);ctx.stroke();
    ctx.fillStyle="#aaa";ctx.beginPath();ctx.ellipse(x+31*s,y+12*s,7*s,5*s,0.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#777";ctx.beginPath();ctx.roundRect(x+27*s,y+30*s,8*s,5*s,2);ctx.fill();
  }else if(tool==="sealer"){
    ctx.fillStyle="#558";ctx.beginPath();ctx.roundRect(x+25*s,y+14*s,14*s,8*s,3);ctx.fill();
    ctx.fillStyle="#888";ctx.fillRect(x+39*s,y+16*s,8*s,4*s);
    ctx.fillStyle="#444";ctx.beginPath();ctx.roundRect(x+27*s,y+22*s,10*s,10*s,2);ctx.fill();
  }
  ctx.fillStyle="#e8c090";ctx.beginPath();ctx.roundRect(x+11*s,y+10*s,9*s,8*s,2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+16*s,y+6*s,13*s,15*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#111";
  ctx.beginPath();ctx.moveTo(x+3*s,y);ctx.quadraticCurveTo(x+4*s,y-12*s,x+16*s,y-12*s);
  ctx.quadraticCurveTo(x+28*s,y-10*s,x+29*s,y+2*s);ctx.lineTo(x+25*s,y+5*s);
  ctx.quadraticCurveTo(x+22*s,y-3*s,x+16*s,y-4*s);ctx.quadraticCurveTo(x+7*s,y-2*s,x+5*s,y+5*s);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+10*s,y-10*s);ctx.quadraticCurveTo(x+13*s,y-18*s,x+18*s,y-10*s);ctx.closePath();ctx.fill();
  ctx.fillStyle="#fff";
  ctx.beginPath();ctx.ellipse(x+11*s,y+7*s,3*s,3*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+21*s,y+7*s,3*s,3*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#2a4a8a";
  ctx.beginPath();ctx.arc(x+12*s,y+7*s,2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+22*s,y+7*s,2*s,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#c8a070";ctx.lineWidth=1*s;ctx.beginPath();ctx.arc(x+16*s,y+11*s,3*s,0.6,Math.PI-0.6);ctx.stroke();
  ctx.strokeStyle="#8a5a3a";ctx.lineWidth=1.5*s;ctx.beginPath();ctx.arc(x+16*s,y+14*s,5*s,0.3,Math.PI-0.3);ctx.stroke();
  ctx.restore();
}

  ctx.fillStyle="#1a1a1a";

// ── Single speech bubble (positioned absolutely, no overlap) ─────────────────
function drawBubble(ctx,cx,cy,text,side){
  if(!text)return;
  ctx.save();
  ctx.font="12px Arial";
  const maxW=160,words=text.split(" ");
  const lines=[];let cur="";
  words.forEach(w=>{
    const t=cur?cur+" "+w:w;
    if(ctx.measureText(t).width>maxW){lines.push(cur);cur=w;}else cur=t;
  });
  if(cur)lines.push(cur);
  const lh=16,pad=10;
  const bw=Math.min(maxW+pad*2,Math.max(...lines.map(l=>ctx.measureText(l).width))+pad*2);
  const bh=lines.length*lh+pad*2;
  const bxRaw=side==="right"?cx+16:cx-bw-16;
  const byRaw=cy-bh-14;
  const bx=Math.max(4,Math.min(W-bw-4,bxRaw));
  const by=Math.max(4,byRaw);
  ctx.fillStyle="#fffef0";ctx.strokeStyle="#ccc";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.fill();ctx.stroke();
  ctx.fillStyle="#fffef0";ctx.beginPath();
  if(side==="right"){ctx.moveTo(bx+4,by+bh);ctx.lineTo(cx+12,cy-4);ctx.lineTo(bx+18,by+bh);}
  else{ctx.moveTo(bx+bw-4,by+bh);ctx.lineTo(cx+4,cy-4);ctx.lineTo(bx+bw-18,by+bh);}
  ctx.fill();
  ctx.strokeStyle="#ccc";ctx.lineWidth=1;
  if(side==="right"){
    ctx.beginPath();ctx.moveTo(bx+4,by+bh+1);ctx.lineTo(cx+12,cy-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+12,cy-3);ctx.lineTo(bx+18,by+bh+1);ctx.stroke();
  }else{
    ctx.beginPath();ctx.moveTo(bx+bw-4,by+bh+1);ctx.lineTo(cx+4,cy-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+4,cy-3);ctx.lineTo(bx+bw-18,by+bh+1);ctx.stroke();
  }
  ctx.fillStyle="#222";ctx.font="12px Arial";ctx.textAlign="left";
  lines.forEach((line,i)=>ctx.fillText(line,bx+pad,by+pad+12+i*lh));
  ctx.restore();
}

// ── Items per chapter ─────────────────────────────────────────────────────────
function getItems(chapter,leakFound){
  if(chapter==="painting"||chapter==="painted") return [
    {id:"paint_can",  x:72,  y:H-88, emoji:"🪣", label:"Paint!",      r:22},
    {id:"speaker",    x:680, y:130,  emoji:"🎸", label:"Santana",     r:22},
    {id:"phone",      x:720, y:210,  emoji:"📱", label:"Call Wife",   r:20},
    {id:"before_after",x:400,y:75,  emoji:"🔀", label:"Before/After",r:20},
  ];
  if(["leak","investigation","boss"].includes(chapter)){
    const items=[
      {id:"check_toilet",x:150,y:H-200,emoji:"🚽",label:"Inspect",r:22},
      {id:"check_pipes", x:365,y:H-200,emoji:"🔧",label:"Inspect",r:22},
      {id:"check_shower",x:620,y:120,  emoji:"🚿",label:"Inspect",r:22},
      {id:"pizza",       x:75, y:190,  emoji:"🍕",label:"Pizza!",  r:20},
      {id:"dr_pepper",   x:75, y:260,  emoji:"🥤",label:"Dr Pepper",r:20},
    ];
    if(leakFound) items.push({id:"seal_tile",x:580,y:200,emoji:"🛠️",label:"Seal It!",r:24});
    return items;
  }
  if(chapter==="victory") return [{id:"play_again",x:W/2,y:H/2+90,emoji:"🔄",label:"Play Again",r:28}];
  return [];
}

function drawItems(ctx,chapter,usedIds,leakFound,nearId){
  getItems(chapter,leakFound).forEach(item=>{
    const used=usedIds.has(item.id)&&!["before_after","speaker","play_again"].includes(item.id);
    if(used)return;
    const near=nearId===item.id;
    // glow
    if(near){ctx.strokeStyle="rgba(255,255,80,0.9)";ctx.lineWidth=3;}
    else{ctx.strokeStyle="rgba(255,220,60,0.5)";ctx.lineWidth=2;}
    ctx.beginPath();ctx.arc(item.x,item.y,item.r+5,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=near?"rgba(255,250,200,0.97)":"rgba(255,240,180,0.88)";
    ctx.beginPath();ctx.arc(item.x,item.y,item.r,0,Math.PI*2);ctx.fill();
    ctx.font=`${item.r*1.0}px Arial`;ctx.textAlign="center";
    ctx.fillText(item.emoji,item.x,item.y+item.r*0.38);
    ctx.fillStyle=near?"#c00":"#444";ctx.font=`bold ${near?11:10}px Arial`;ctx.textAlign="center";
    const hint=near?" [SPACE]":"";
    ctx.fillText(item.label+hint,item.x,item.y+item.r+14);
  });
}

// ── Rooms ─────────────────────────────────────────────────────────────────────
function drawOrangeRoom(ctx){
  ctx.fillStyle="#e8a060";ctx.fillRect(0,0,W,H-80);
  ctx.strokeStyle="rgba(200,130,60,0.25)";ctx.lineWidth=1;
  for(let y=50;y<H-90;y+=45){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.fillStyle="#7a5a3a";ctx.fillRect(0,H-80,W,80);
  for(let i=0;i<W;i+=90){ctx.strokeStyle="#6a4a2a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(i,H-80);ctx.lineTo(i,H);ctx.stroke();}
  ctx.fillStyle="#2a2a2a";ctx.beginPath();ctx.roundRect(260,55,280,170,8);ctx.fill();
  ctx.fillStyle="#111";ctx.beginPath();ctx.roundRect(268,63,264,154,4);ctx.fill();
  ctx.strokeStyle="#9a7a5a";ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(100,H-80);ctx.lineTo(80,180);ctx.stroke();
  ctx.beginPath();ctx.moveTo(140,H-80);ctx.lineTo(155,180);ctx.stroke();
  for(let ly=200;ly<H-80;ly+=55){ctx.beginPath();ctx.moveTo(84+(ly-180)*0.2,ly);ctx.lineTo(152-(ly-180)*0.08,ly);ctx.stroke();}
  ctx.fillStyle="#555";ctx.beginPath();ctx.roundRect(60,H-94,32,27,3);ctx.fill();
  ctx.fillStyle="#88aaff";ctx.fillRect(62,H-90,28,20);
}

function drawWhiteRoom(ctx){
  ctx.fillStyle="#5c3d1a";ctx.fillRect(0,0,260,H-80);
  ctx.fillStyle="#f2ede4";ctx.fillRect(260,0,W-260,H-80);
  ctx.fillStyle="#e0dbd0";ctx.fillRect(260,H-86,W-260,5);
  ctx.fillStyle="#4a3010";ctx.fillRect(0,H-86,260,5);
  ctx.fillStyle="#c8a878";ctx.fillRect(0,H-80,W,80);
  for(let i=0;i<W;i+=100){ctx.strokeStyle="rgba(160,120,60,0.35)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(i,H-80);ctx.lineTo(i,H);ctx.stroke();}
  ctx.fillStyle="#2a1506";ctx.beginPath();ctx.roundRect(18,65,220,150,8);ctx.fill();
  ctx.fillStyle="#080808";ctx.beginPath();ctx.roundRect(25,72,206,136,4);ctx.fill();
  ctx.fillStyle="#88aacc";ctx.beginPath();ctx.roundRect(560,70,130,110,5);ctx.fill();
  ctx.fillStyle="#6688aa";ctx.fillRect(558,120,134,4);ctx.fillRect(620,68,4,114);
  ctx.fillStyle="rgba(255,255,255,0.22)";ctx.fillRect(568,80,44,32);
  ctx.fillStyle="#2a1a0a";ctx.beginPath();ctx.roundRect(660,110,130,170,8);ctx.fill();
  ctx.fillStyle="#111";ctx.beginPath();ctx.roundRect(675,125,100,130,4);ctx.fill();
  ctx.fillStyle="rgba(255,80,0,0.85)";
  for(let fi=0;fi<4;fi++){ctx.beginPath();ctx.ellipse(700+fi*14,H-95-fi*6,10,18,0,0,Math.PI*2);ctx.fill();}
}

function drawBathroom(ctx){
  ctx.fillStyle="#eaeef0";ctx.fillRect(0,0,W,H-80);
  ctx.strokeStyle="#c8d4d8";ctx.lineWidth=0.8;
  for(let tx=0;tx<W;tx+=50){ctx.beginPath();ctx.moveTo(tx,0);ctx.lineTo(tx,H-80);ctx.stroke();}
  for(let ty=0;ty<H-80;ty+=50){ctx.beginPath();ctx.moveTo(0,ty);ctx.lineTo(W,ty);ctx.stroke();}
  ctx.fillStyle="#d2cabb";ctx.fillRect(0,H-80,W,80);
  ctx.strokeStyle="#b8b0a0";ctx.lineWidth=0.8;
  for(let fx=0;fx<W;fx+=65){ctx.beginPath();ctx.moveTo(fx,H-80);ctx.lineTo(fx,H);ctx.stroke();}
  ctx.fillStyle="#f2f2f0";ctx.beginPath();ctx.ellipse(150,H-130,42,55,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#ccc";ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle="#e6e6e4";ctx.beginPath();ctx.ellipse(150,H-152,30,22,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#ccc";ctx.stroke();
  ctx.fillStyle="#999";ctx.font="bold 11px Arial";ctx.textAlign="center";ctx.fillText("TOILET",150,H-76);
  ctx.fillStyle="#d4d0c8";ctx.beginPath();ctx.roundRect(320,H-190,90,70,6);ctx.fill();
  ctx.strokeStyle="#b8b4aa";ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle="#bbb";ctx.fillRect(342,H-122,12,44);ctx.fillRect(372,H-122,12,44);
  ctx.fillStyle="#888";ctx.fillRect(332,H-126,42,8);
  ctx.fillStyle="#999";ctx.font="bold 11px Arial";ctx.textAlign="center";ctx.fillText("PIPES",365,H-76);
  ctx.fillStyle="#c2d8dc";ctx.beginPath();ctx.roundRect(490,50,270,310,10);ctx.fill();
  ctx.strokeStyle="#9ab8bc";ctx.lineWidth=3;ctx.stroke();
  ctx.strokeStyle="rgba(180,205,210,0.55)";ctx.lineWidth=0.8;
  for(let sx=498;sx<752;sx+=44){ctx.beginPath();ctx.moveTo(sx,58);ctx.lineTo(sx,352);ctx.stroke();}
  for(let sy=58;sy<352;sy+=44){ctx.beginPath();ctx.moveTo(498,sy);ctx.lineTo(752,sy);ctx.stroke();}
  ctx.fillStyle="#888";ctx.fillRect(598,64,8,44);ctx.beginPath();ctx.ellipse(602,64,22,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#999";ctx.font="bold 11px Arial";ctx.textAlign="center";ctx.fillText("SHOWER",625,370);
}

function drawLeakDrops(ctx,t){
  [140,360,560].forEach((x,i)=>{
    const dy=((t*70+i*90)%230)+40;
    ctx.fillStyle="#4488bb";ctx.beginPath();ctx.arc(x,dy,5,0,Math.PI*2);ctx.fill();
    if(dy>220){ctx.strokeStyle="rgba(68,136,187,0.35)";ctx.lineWidth=1;const r=(dy-220)*0.35;ctx.beginPath();ctx.ellipse(x,260,r,r*0.35,0,0,Math.PI*2);ctx.stroke();}
  });
}

// ── Main Component ────────────────────────────────────────────────────────────
function CarlosGame(){
  const canvasRef=useRef(null);
  const keysRef=useRef({});
  const animRef=useRef(null);
  const spaceUsedRef=useRef(false);

  const [chapter,setChapter]=useState("painting");
  const [showBefore,setShowBefore]=useState(true);
  const [paintPct,setPaintPct]=useState(0);
  const [painting,setPainting]=useState(false);
  const [tick,setTick]=useState(0);
  const [usedBtns,setUsedBtns]=useState(new Set());
  const [leakFound,setLeakFound]=useState(false);
  const [carlosPos,setCarlosPos]=useState({x:300,y:320});
  const [carlosFace,setCarlosFace]=useState("right");
  const [carlosAct,setCarlosAct]=useState("idle");
  const [yiwenAct,setYiwenAct]=useState("camera");
  const [nearItem,setNearItem]=useState(null);
  // followers lag behind
  const michaelTargetRef=useRef({x:370,y:330});
  const yiwenTargetRef=useRef({x:240,y:335});
  const [michaelPos,setMichaelPos]=useState({x:370,y:330});
  const [yiwenPos,setYiwenPos]=useState({x:240,y:335});

  // Sequential bubble queue: array of {who, text}
  const [bubbleQueue,setBubbleQueue]=useState([]);
  const [activeBubble,setActiveBubble]=useState(null);
  const bubbleTimerRef=useRef(null);

  const michaelTool=chapter==="painting"?"roller":["leak","investigation"].includes(chapter)?"flashlight":chapter==="boss"?"wrench":chapter==="victory"?"sealer":"none";

  // enqueue a conversation — array of {who,text}
  const converse=(lines)=>{
    setBubbleQueue(lines);
  };

  // bubble sequencer
  useEffect(()=>{
    if(bubbleQueue.length===0){setActiveBubble(null);return;}
    const [first,...rest]=bubbleQueue;
    setActiveBubble(first);
    bubbleTimerRef.current=setTimeout(()=>{
      setBubbleQueue(rest);
    },2600);
    return()=>clearTimeout(bubbleTimerRef.current);
  },[bubbleQueue]);

  // keyboard
  useEffect(()=>{
    const d=e=>{
      keysRef.current[e.key.toLowerCase()]=true;
      if(e.key===" "&&!spaceUsedRef.current){
        spaceUsedRef.current=true;
        // get current nearItem from state via ref trick
        setNearItem(ni=>{
          if(ni) handleItem(ni);
          return ni;
        });
      }
    };
    const u=e=>{
      keysRef.current[e.key.toLowerCase()]=false;
      if(e.key===" ")spaceUsedRef.current=false;
    };
    window.addEventListener("keydown",d);window.addEventListener("keyup",u);
    return()=>{window.removeEventListener("keydown",d);window.removeEventListener("keyup",u);};
  },[]);// eslint-disable-line

  // game loop
  useEffect(()=>{
    let last=0;
    const loop=ts=>{
      if(ts-last>28){
        last=ts;setTick(t=>t+1);
        setCarlosPos(prev=>{
          const k=keysRef.current;let{x,y}=prev;const sp=4;
          if(k["arrowleft"]||k["a"]){x=Math.max(10,x-sp);setCarlosFace("left");}
          if(k["arrowright"]||k["d"]){x=Math.min(W-56,x+sp);setCarlosFace("right");}
          if(k["arrowup"]||k["w"])y=Math.max(100,y-sp);
          if(k["arrowdown"]||k["s"])y=Math.min(H-100,y+sp);
          // followers lag behind Carlos (offset behind him)
          setCarlosFace(f=>{
            const dir=f==="right"?-1:1;
            michaelTargetRef.current={x:Math.max(10,Math.min(W-56,x+dir*52)),y:Math.max(105,Math.min(H-95,y+14))};
            yiwenTargetRef.current= {x:Math.max(10,Math.min(W-56,x+dir*80)),y:Math.max(105,Math.min(H-95,y+18))};
            return f;
          });
          setMichaelPos(mp=>({x:mp.x+(michaelTargetRef.current.x-mp.x)*0.12, y:mp.y+(michaelTargetRef.current.y-mp.y)*0.12}));
          setYiwenPos(yp=>({x:yp.x+(yiwenTargetRef.current.x-yp.x)*0.09,   y:yp.y+(yiwenTargetRef.current.y-yp.y)*0.09}));
          return{x,y};
        });
        // proximity check
        setCarlosPos(pos=>{
          setChapter(ch=>{
            setLeakFound(lf=>{
              const items=getItems(ch,lf);
              let found=null;
              items.forEach(item=>{
                const dist=Math.sqrt((pos.x+19-item.x)**2+(pos.y+35-item.y)**2);
                if(dist<75)found=item.id;
              });
              setNearItem(found);
              return lf;
            });
            return ch;
          });
          return pos;
        });
      }
      animRef.current=requestAnimationFrame(loop);
    };
    animRef.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(animRef.current);
  },[]);

  // paint progress
  useEffect(()=>{
    if(!painting)return;
    const iv=setInterval(()=>{
      setPaintPct(p=>{
        const n=Math.min(100,p+1.8);
        if(n>=100){
          clearInterval(iv);setPainting(false);setCarlosAct("idle");
          setChapter("painted");setShowBefore(false);
          converse([{who:"carlos",text:"We did it! Walls look incredible!"},{who:"michael",text:"My rollers never let me down."},{who:"yiwen",text:"Taking photos for the memories!"}]);
          setYiwenAct("camera");
        }
        return n;
      });
    },100);
    return()=>clearInterval(iv);
  },[painting]);

  const handleItem=id=>{
    setUsedBtns(prev=>new Set([...prev,id]));
    switch(id){
      case "paint_can":
        setCarlosAct("painting");setPainting(true);
        converse([{who:"carlos",text:"Alright! Walls won't paint themselves!"},{who:"michael",text:"I have three extra rollers ready!"},{who:"yiwen",text:"I will do the touch-ups perfectly!"}]);
        break;
      case "speaker":
        converse([{who:"carlos",text:"Santana makes me unstoppable!"},{who:"michael",text:"Everyone works faster with this!"},{who:"yiwen",text:"I am dancing AND working!"}]);
        break;
      case "phone":
        converse([{who:"carlos",text:"Honey! The room is done! Miss you!"},{who:"michael",text:"He gets +50 energy every time."},{who:"yiwen",text:"Couple goals honestly."}]);
        setTimeout(()=>{
          setChapter("leak");setCarlosPos({x:300,y:310});
          converse([{who:"yiwen",text:"CARLOS! WATER IS DRIPPING DOWN!"},{who:"carlos",text:"Wait... do I hear dripping?"},{who:"michael",text:"I hear something too..."}]);
          setYiwenAct("detective");
        },3200);
        break;
      case "before_after":
        setShowBefore(v=>{
          const next=!v;
          converse(next
            ?[{who:"carlos",text:"Remember those orange walls?"},{who:"yiwen",text:"Hard to believe this is the same room!"}]
            :[{who:"carlos",text:"Look at this transformation!"},{who:"michael",text:"Worth every tool I brought."},{who:"yiwen",text:"Stunning! Before and after!"}]
          );
          return next;
        });
        break;
      case "check_toilet":
        setChapter("investigation");
        converse([{who:"carlos",text:"Toilet looks completely fine..."},{who:"michael",text:"Water lines clear here."},{who:"yiwen",text:"My theory: NOT the toilet."}]);
        break;
      case "check_pipes":
        setChapter("investigation");
        converse([{who:"carlos",text:"Pipes seem totally normal..."},{who:"michael",text:"Let me shine all three flashlights."},{who:"yiwen",text:"Hmm. Suspicious pipes though."}]);
        break;
      case "check_shower":
        converse([{who:"carlos",text:"THE TILE! A gap in the shower tile! THAT IS the leak!"},{who:"yiwen",text:"I KNEW it was a mystery!"},{who:"michael",text:"Elementary!"}]);
        setLeakFound(true);setChapter("boss");setYiwenAct("detective");
        break;
      case "pizza":
        converse([{who:"yiwen",text:"PIZZA BREAK! Energy fully restored!"},{who:"carlos",text:"Back in action!"},{who:"michael",text:"I also brought backup snacks."}]);
        break;
      case "dr_pepper":
        converse([{who:"michael",text:"DIET DR PEPPER! MAXIMUM ENERGY!"},{who:"carlos",text:"Michael is now FULLY CHARGED!"},{who:"yiwen",text:"He is basically vibrating right now."}]);
        break;
      case "seal_tile":
        setCarlosAct("idle");
        converse([{who:"carlos",text:"Applying tile sealer... done. Leak sealed."},{who:"michael",text:"Perfect repair. As expected."},{who:"yiwen",text:"WE DID IT! Photo for the album!"}]);
        setYiwenAct("camera");
        setTimeout(()=>setChapter("victory"),2200);
        break;
      case "play_again":
        setChapter("painting");setPaintPct(0);setPainting(false);
        setUsedBtns(new Set());setLeakFound(false);
        setCarlosPos({x:300,y:320});setCarlosFace("right");setCarlosAct("idle");
        setYiwenAct("camera");setShowBefore(true);
        converse([{who:"carlos",text:"Ready to transform this room!"},{who:"michael",text:"I brought every tool we need."},{who:"yiwen",text:"This is going to look amazing!"}]);
        break;
    }
  };

  // draw
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,W,H);
    if(chapter==="painting"){showBefore?drawOrangeRoom(ctx):drawWhiteRoom(ctx);}
    else if(chapter==="painted"){drawWhiteRoom(ctx);}
    else if(["leak","investigation","boss"].includes(chapter)){drawBathroom(ctx);drawLeakDrops(ctx,tick*0.04);}
    else if(chapter==="victory"){drawWhiteRoom(ctx);}
    if(chapter==="painting"){
      ctx.fillStyle="rgba(0,0,0,0.5)";ctx.beginPath();ctx.roundRect(W/2-145,18,290,28,14);ctx.fill();
      const g=ctx.createLinearGradient(W/2-139,0,W/2+139,0);g.addColorStop(0,"#4af");g.addColorStop(1,"#a4f");ctx.fillStyle=g;
      ctx.beginPath();ctx.roundRect(W/2-139,24,(paintPct/100)*278,16,8);ctx.fill();
      ctx.fillStyle="#fff";ctx.font="bold 12px Arial";ctx.textAlign="center";
      ctx.fillText(`Painting ${Math.round(paintPct)}%`,W/2,38);
    }
    drawItems(ctx,chapter,usedBtns,leakFound,nearItem);
    // draw followers first (behind Carlos)
    drawYiwen(ctx,yiwenPos.x,yiwenPos.y,carlosFace,chapter==="investigation"||chapter==="boss"?"detective":yiwenAct);
    drawMichael(ctx,michaelPos.x,michaelPos.y,carlosFace,michaelTool);
    drawCarlos(ctx,carlosPos.x,carlosPos.y,carlosFace,carlosAct);

    // single active bubble only
    if(activeBubble){
      const who=activeBubble.who;
      const px=who==="carlos"?carlosPos.x+18:who==="michael"?michaelPos.x+11:yiwenPos.x+10;
      const py=who==="carlos"?carlosPos.y+5:who==="michael"?michaelPos.y+5:yiwenPos.y+5;
      const side=who==="yiwen"?"left":"right";
      drawBubble(ctx,px,py,activeBubble.text,side);
    }

    if(chapter==="victory"){
      ctx.fillStyle="rgba(0,0,0,0.38)";ctx.fillRect(0,0,W,H);
      ctx.fillStyle="#f0d060";ctx.font="bold 42px Arial";ctx.textAlign="center";
      ctx.fillText("MISSION COMPLETE!",W/2,H/2-50);
      ctx.fillStyle="#fff";ctx.font="22px Arial";
      ctx.fillText("Leak sealed! House saved!",W/2,H/2);
      ctx.fillText("🍕 Pizza  🎸 Santana  🏆 Victory!",W/2,H/2+44);
    }
    // hint bar
    ctx.fillStyle="rgba(0,0,0,0.55)";ctx.fillRect(0,H-22,W,22);
    ctx.fillStyle="#f0d060";ctx.font="11px Arial";ctx.textAlign="center";
    const hint=nearItem?"Press SPACE to interact!":"Move with Arrow Keys / WASD · Walk up to items and press SPACE";
    ctx.fillText(hint,W/2,H-8);
  },[tick,chapter,carlosPos,carlosFace,carlosAct,activeBubble,paintPct,showBefore,usedBtns,leakFound,nearItem,yiwenAct,michaelTool,yiwenPos,michaelPos]);

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{color:"#f0d060",fontSize:18,fontWeight:700,letterSpacing:1,textAlign:"center"}}>Carlos Home Improvement</div>
      <div style={{border:"3px solid #f0d060",borderRadius:12,overflow:"hidden",boxShadow:"0 0 32px rgba(240,208,96,0.2)"}}>
        <canvas ref={canvasRef} width={W} height={H} style={{display:"block",maxWidth:"100%"}}/>
      </div>
      <div style={{color:"#8888aa",fontSize:12,textAlign:"center"}}>
        {chapter==="painting"&&"Chapter 1 — The Projector Room"}
        {chapter==="painted"&&"Chapter 2 — The Calm Before the Storm"}
        {chapter==="leak"&&"Chapter 3 — The Leak Strikes Back"}
        {chapter==="investigation"&&"Chapter 4 — Investigation Mode"}
        {chapter==="boss"&&"Chapter 5 — The Real Culprit Found!"}
        {chapter==="victory"&&"Chapter 6 — Victory!"}
      </div>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(CarlosGame));
</script>
</body>
</html>
